<!DOCTYPE html>
<html>
<body>

<h2>Countdown Timer</h2>
<input id="time" placeholder="Sekund">
<button onclick="start()">Start</button>

<h3 id="out"></h3>

<script>
let interval;

function start(){
  let t = Number(time.value);
  clearInterval(interval);

  interval = setInterval(()=>{
    out.innerText = t;
    t--;
    if(t<0) clearInterval(interval);
  },1000);

  
}
</script>
</body>
</html>
